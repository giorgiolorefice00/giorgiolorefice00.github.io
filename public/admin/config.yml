  # ── ♫ MUSIC PAGE — RELEASES (DISCOGRAPHY) ───────────────────────────────────
  - name: releases
    label: "♫ Music — Releases (Discography)"
    label_singular: Release
    folder: src/content/releases
    create: true
    delete: true
    slug: "{{releaseDate}}-{{slug}}"
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Subtitle, name: subtitle, widget: string, required: false, hint: "e.g. EP · 4 TRACKS" }
      - label: Release Date
        name: releaseDate
        widget: datetime
        format: 'YYYY-MM-DD'
        date_format: 'YYYY-MM-DD'
        time_format: false
        picker_utc: true
      - { label: Label, name: label, widget: string }
      - label: Format
        name: format
        widget: select
        options:
          - { label: EP, value: EP }
          - { label: Single, value: Single }
          - { label: Remix, value: Remix }
          - { label: Album, value: Album }
      - label: Description (English)
        name: description
        widget: object
        fields:
          - { label: English, name: en, widget: text }
          - { label: Italiano, name: it, widget: text }
      - { label: Cover Art, name: coverArt, widget: image, required: false }
      - label: Tracklist
        name: tracklist
        widget: list
        required: false
        fields:
          - { label: Number, name: number, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Duration, name: duration, widget: string }
      - { label: SoundCloud URL, name: soundcloudUrl, widget: string, required: false }
      - { label: Spotify URL, name: spotifyUrl, widget: string, required: false }
      - { label: Apple Music URL, name: appleMusicUrl, widget: string, required: false }
      - { label: Bandcamp URL, name: bandcampUrl, widget: string, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false, hint: "Show as latest release on Music page" }

  # ── ♫ MUSIC PAGE — MIXES & PODCASTS ─────────────────────────────────────────
  - name: mixes
    label: "♫ Music — Mixes & Podcasts"
    label_singular: Mix
    folder: src/content/mixes
    create: true
    delete: true
    slug: "{{date}}-{{slug}}"
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Duration, name: duration, widget: string, hint: "e.g. 6h 12m" }
      - { label: Venue / Context, name: venue, widget: string, required: false }
      - label: Date
        name: date
        widget: datetime
        format: 'YYYY-MM-DD'
        date_format: 'YYYY-MM-DD'
        time_format: false
        picker_utc: true
      - label: Category
        name: category
        widget: select
        options:
          - { label: Resident Set, value: resident }
          - { label: Festival Set, value: festival }
          - { label: Radio Show, value: radio }
          - { label: Guest Mix, value: guest }
      - { label: Cover Art, name: coverArt, widget: image, required: false }
      - { label: SoundCloud URL, name: soundcloudUrl, widget: string, required: false }
      - { label: Mixcloud URL, name: mixcloudUrl, widget: string, required: false }
      - { label: BPM Range, name: bpmRange, widget: string, hint: "e.g. 132 – 148" }
      - { label: Genre, name: genre, widget: string }
      - { label: Featured, name: featured, widget: boolean, default: false }

  # ── 👤 ABOUT PAGE — BIO & STATS ─────────────────────────────────────────────
  - name: about
    label: "👤 About — Bio & Stats"
    files:
      - name: about
        label: About the Artist
        file: src/content/about/about.md
        format: frontmatter
        fields:
          - label: Headline Lines
            name: headlineLines
            widget: list
            min: 3
            max: 3
            hint: "Exactly 3 lines. Line 2 renders in blood red."
            field: { label: Line, name: line, widget: string }
          - label: Short Paragraphs (homepage)
            name: paragraphs
            widget: list
            field: { label: Paragraph, name: paragraph, widget: text }
          - label: Stats
            name: stats
            widget: list
            fields:
              - { label: Number, name: num, widget: string, hint: "e.g. 10+ or ∞" }
              - { label: Label, name: label, widget: string }
          - label: Full Bio (about page)
            name: fullBio
            widget: list
            required: false
            field: { label: Paragraph, name: paragraph, widget: text }
          - label: Fact File
            name: factFile
            widget: list
            required: false
            fields:
              - { label: Label, name: label, widget: string, hint: "e.g. born" }
              - { label: Value, name: value, widget: string, hint: "e.g. milano, 1993" }
          - { label: Born In, name: bornIn, widget: string, required: false }
          - { label: Based In, name: basedIn, widget: string, required: false }
          - { label: Active Since, name: activeSince, widget: string, required: false }

