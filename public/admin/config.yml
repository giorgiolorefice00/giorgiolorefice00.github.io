backend:
  name: github
  repo: giorgiolorefice00/giorgiolorefice00.github.io
  site_domain: giorgiolorefice.com
  site_url: https://giorgiolorefice.com
  display_url: https://giorgiolorefice.com
  branch: main
  base_url: https://dj-oauth.vercel.app/
  auth_endpoint: api/auth

media_folder: public/uploads
public_folder: /uploads

collections:

  # ── ⚙ GLOBAL — SITE CONFIGURATION ──────────────────────────────────────────
  - name: siteConfig
    label: "⚙ Site Configuration"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/siteConfig/site-config.md
        label: "Site Configuration"
        name: site-config
        fields:
          - label: Social Media URLs
            name: socials
            widget: object
            fields:
              - { label: Instagram URL, name: instagram, widget: string, required: false }
              - { label: SoundCloud URL, name: soundcloud, widget: string, required: false }
              - { label: Spotify profile URL, name: spotify, widget: string, required: false }
              - { label: Apple Music profile URL, name: appleMusic, widget: string, required: false }
              - { label: Bandcamp URL, name: bandcamp, widget: string, required: false }
              - { label: YouTube Music URL, name: youtubeMusic, widget: string, required: false }
          - label: Contact Information
            name: contacts
            widget: object
            hint: "Direct contact info shown on the Contact page"
            fields:
              - { label: Email Address, name: email, widget: string, hint: "Public-facing email shown on the Contact page" }
              - { label: Phone Number, name: phone, widget: string, required: false, hint: "With country code and spaces (e.g. +39 333 123 4567)" }
          - label: Downloadable Files
            name: files
            widget: object
            fields:
              - { label: EPK (.zip), name: epk, widget: string, required: false }
              - { label: Technical Rider, name: technicalRider, widget: string, required: false }
              - { label: Stage Plot, name: stagePlot, widget: string, required: false }
              - { label: Press Photos (.zip), name: pressPhotosZip, widget: string, required: false }

  # ── 🌐 HEADER ────────────────────────────────────────────────────────────────
  - name: headerText
    label: "🌐 Header"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/headerText/header-text.md
        label: "Header"
        name: header-text
        fields:
          - label: Navigation Links
            name: nav
            widget: object
            hint: "Labels for the main nav menu — desktop and mobile"
            fields:
              - label: Home
                name: home
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Italiano, name: it, widget: string }
              - label: About
                name: about
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Italiano, name: it, widget: string }
              - label: Music
                name: music
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Italiano, name: it, widget: string }
              - label: Events
                name: events
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Italiano, name: it, widget: string }
              - label: Media
                name: media
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Italiano, name: it, widget: string }
              - label: Contact
                name: contact
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Italiano, name: it, widget: string }

  # ── 🦶 FOOTER ────────────────────────────────────────────────────────────────
  - name: footerText
    label: "🦶 Footer"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/footerText/footer-text.md
        label: "Footer"
        name: footer-text
        fields:
          - label: Brand phrase — line 1
            name: brandPhrase1
            widget: object
            hint: "Large display text top-right of footer (e.g. BOOK. PLAY.)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Brand phrase — line 2
            name: brandPhrase2
            widget: object
            hint: "Second line (e.g. DISAPPEAR.)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Sitemap column heading
            name: sitemap
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Listen column heading
            name: listen
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Follow column heading
            name: follow
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Copyright line
            name: rights
            widget: object
            hint: "Text after the year and name (e.g. all rights reserved)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Privacy link label
            name: privacy
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Terms link label
            name: terms
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Press Kit link label
            name: pressKit
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── 🏠 HOME — HERO ───────────────────────────────────────────────────────────
  - name: homeHero
    label: "🏠 Home — Hero"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/homeHero/home-hero.md
        label: "Hero Section"
        name: home-hero
        fields:
          - label: Eyebrow
            name: heroEyebrow
            widget: object
            hint: "Small label above the DJ name (e.g. [ LIVE / 2026 — MILANO ])"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Tagline — left half
            name: heroTaglineLeft
            widget: object
            hint: "Appears left of the red divider (e.g. underground techno)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Tagline — right half
            name: heroTaglineRight
            widget: object
            hint: "Appears right of the red divider (e.g. rave architecture)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Photo caption
            name: heroPhotoCaption
            widget: object
            hint: "Small mono tag bottom-right of the DJ photo"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Primary CTA button (Listen to Latest Mix)
            name: heroCtaPrimary
            widget: object
            hint: "Main button on the hero. URL field sets where it goes when clicked."
            fields:
              - { label: English text, name: en, widget: string }
              - { label: Italiano text, name: it, widget: string }
              - { label: URL (destination), name: url, widget: string, required: false, hint: "e.g. /music or https://soundcloud.com/... — leave empty to disable the button" }
          - label: Secondary CTA button (View Tour Dates)
            name: heroCtaSecondary
            widget: object
            hint: "Second button on the hero."
            fields:
              - { label: English text, name: en, widget: string }
              - { label: Italiano text, name: it, widget: string }
              - { label: URL (destination), name: url, widget: string, required: false, hint: "e.g. /events — leave empty to disable the button" }
          - label: Scroll indicator label
            name: heroScroll
            widget: object
            hint: "Small text next to the scroll arrow (e.g. ↓ scroll)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── 🏠 HOME — ABOUT SNIPPET ──────────────────────────────────────────────────
  - name: homeAbout
    label: "🏠 Home — About Snippet"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/homeAbout/home-about.md
        label: "About Snippet"
        name: home-about
        fields:
          - label: Section eyebrow
            name: aboutEyebrow
            widget: object
            hint: "Small label above the headline (e.g. [ 001 / about ])"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Read full story link text
            name: aboutLinkText
            widget: object
            hint: "The link that goes to /about (e.g. read the full story)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Headline — Line 1
            name: headlineLine1
            widget: object
            hint: "First display line (e.g. BORN IN THE)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Headline — Line 2 (blood red)
            name: headlineLine2
            widget: object
            hint: "Second line — renders in blood red (e.g. BASEMENT)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Headline — Line 3
            name: headlineLine3
            widget: object
            hint: "Third smaller line (e.g. OF A CITY THAT NEVER SLEEPS.)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Bio Paragraphs
            name: paragraphs
            widget: list
            hint: "Short bio shown on the homepage snippet (2–3 lines)"
            field:
              label: Paragraph
              name: paragraph
              widget: object
              fields:
                - { label: English, name: en, widget: text }
                - { label: Italiano, name: it, widget: text }
          - label: Stats (3 blocks)
            name: stats
            widget: list
            min: 3
            max: 3
            hint: "Three stat blocks shown to the right of the bio"
            fields:
              - { label: "Value (e.g. 10+, 48, ∞)", name: num, widget: string }
              - label: Label
                name: label
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Italiano, name: it, widget: string }

  # ── 🏠 HOME — FEATURED MIX ───────────────────────────────────────────────────
  - name: homeMix
    label: "🏠 Home — Featured Mix"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/homeMix/home-mix.md
        label: "Featured Mix Section"
        name: home-mix
        fields:
          - label: Section eyebrow
            name: mixEyebrow
            widget: object
            hint: "Small label above the player (e.g. [ 002 / listen ])"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Latest Drop badge
            name: mixLatestDropLabel
            widget: object
            hint: "Badge shown on the mix card (e.g. LATEST DROP)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Spotify link label
            name: listenSpotify
            widget: object
            hint: "Label on the Spotify streaming link in the mix player sidebar"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: SoundCloud link label
            name: listenSoundcloud
            widget: object
            hint: "Label on the SoundCloud streaming link in the mix player sidebar"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: YouTube Music link label
            name: listenYoutubeMusic
            widget: object
            hint: "Label on the YouTube Music streaming link in the mix player sidebar"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── 🏠 HOME — EVENTS PREVIEW ─────────────────────────────────────────────────
  - name: homeEvents
    label: "🏠 Home — Events Preview"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/homeEvents/home-events.md
        label: "Events Preview Section"
        name: home-events
        fields:
          - label: Section heading
            name: eventsHeading
            widget: object
            hint: "Large heading above the event cards (e.g. NEXT GIGS)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Section subtitle
            name: eventsSubtitle
            widget: object
            hint: "Small mono line below the heading"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: All Tour Dates link
            name: allTourDates
            widget: object
            hint: "Link that takes you to the full events page"
            fields:
              - { label: English text, name: en, widget: string }
              - { label: Italiano text, name: it, widget: string }
              - { label: URL (destination), name: url, widget: string, required: false, hint: "e.g. /events" }
          - label: Card CTA label
            name: eventsCardCtaLabel
            widget: object
            hint: "Button on each event card linking to the contact page (e.g. 'reservation →')"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── 🏠 HOME — PRESS SLIDER ───────────────────────────────────────────────────
  - name: homePress
    label: "🏠 Home — Press Slider"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/homePress/home-press.md
        label: "Press Slider Section"
        name: home-press
        fields:
          - label: Section eyebrow
            name: pressEyebrow
            widget: object
            hint: "Small label above the heading (e.g. [ 004 / press ])"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Heading line 1
            name: pressHeading1
            widget: object
            hint: "First line of the large heading (e.g. WHAT THEY'RE)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Heading line 2
            name: pressHeading2
            widget: object
            hint: "Second line of the large heading (e.g. SAYING.)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── 👤 ABOUT — BIO & STATS ──────────────────────────────────────────────────
  - name: about
    label: "👤 About — Bio & Stats"
    delete: false
    editor: { preview: false }
    files:
      - name: about
        label: About the Artist
        file: src/content/about/about.md
        format: frontmatter
        fields:
          - label: Full Bio (about page)
            name: fullBio
            widget: list
            required: false
            field: { label: Paragraph, name: paragraph, widget: text }
          - label: Fact File
            name: factFile
            widget: list
            required: false
            fields:
              - { label: Label, name: label, widget: string, hint: "e.g. born" }
              - { label: Value, name: value, widget: string, hint: "e.g. milano, 1993" }
          - { label: Born In, name: bornIn, widget: string, required: false }
          - { label: Based In, name: basedIn, widget: string, required: false }
          - { label: Active Since, name: activeSince, widget: string, required: false }

  # ── 👤 ABOUT — ACHIEVEMENTS ─────────────────────────────────────────────────
  - name: achievements
    label: "👤 About — Achievements"
    label_singular: Achievement
    folder: src/content/achievements
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    format: frontmatter
    fields:
      - { label: Year, name: year, widget: string, hint: "e.g. 2025" }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Order, name: order, widget: number, hint: "Lower number = shown first" }

  # ── 👤 ABOUT — RESIDENCIES ──────────────────────────────────────────────────
  - name: residencies
    label: "👤 About — Residencies"
    label_singular: Residency
    folder: src/content/residencies
    create: true
    delete: true
    slug: "{{slug}}"
    format: frontmatter
    fields:
      - { label: Venue, name: venue, widget: string }
      - { label: City, name: city, widget: string }
      - { label: Start Year, name: startYear, widget: string }
      - { label: End Year, name: endYear, widget: string, required: false, hint: "Leave blank for present" }


  # ── 👤 ABOUT — PAGE TEXT ────────────────────────────────────────────────────
  - name: aboutText
    label: "👤 About — Page Text"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/aboutText/about-text.md
        label: "About Page Text"
        name: about-text
        fields:
          - label: Page title — line 1
            name: titleLine1
            widget: object
            hint: "Large display text, line 1 (e.g. THE MAN)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Page title — line 2
            name: titleLine2
            widget: object
            hint: "Renders in blood red (e.g. BEHIND THE DECKS.)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Achievements section heading
            name: achievementsHeading
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Residencies section heading
            name: residenciesHeading
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Press articles section heading
            name: pressArticlesHeading
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Fact file label
            name: factFileLabel
            widget: object
            hint: "Header above the fact file sidebar (e.g. [ FACT FILE ])"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Download full bio link text
            name: downloadBio
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── ♫ MUSIC — LATEST RELEASE ────────────────────────────────────────────────
  - name: music-latest-release
    label: "♫ Music — Latest Release"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/latestRelease/latest-release.md
        label: "Latest Release"
        name: latest-release
        fields:
          - label: Title
            name: title
            widget: object
            hint: "The release title shown as the headline"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Description
            name: description
            widget: object
            required: false
            hint: "Short description shown below the title (optional)"
            fields:
              - { label: English, name: en, widget: text, required: false }
              - { label: Italiano, name: it, widget: text, required: false }
          - label: Release Date
            name: releaseDate
            widget: datetime
            format: 'YYYY-MM-DD'
            date_format: 'YYYY-MM-DD'
            time_format: false
            picker_utc: true
          - { label: Cover Artwork, name: coverArt, widget: image, required: false, hint: "Square artwork — minimum 800×800px" }
          - { label: SoundCloud URL, name: soundcloudUrl, widget: string, required: false }
          - { label: YouTube Music URL, name: youtubeMusicUrl, widget: string, required: false }
          - label: Tracklist
            name: tracklist
            widget: list
            required: false
            hint: "Add a row per track. Leave empty for single-track releases."
            fields:
              - { label: Track Number, name: number, widget: number, value_type: int }
              - label: Track Title
                name: title
                widget: object
                fields:
                  - { label: English, name: en, widget: string }
                  - { label: Italiano, name: it, widget: string }
              - { label: Duration, name: duration, widget: string, hint: "Format: M:SS (e.g. 7:18)" }

  # ── ♫ MUSIC — STREAMING ──────────────────────────────────────────────────────
  - name: musicStreaming
    label: "♫ Music — Streaming"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/musicStreaming/music-streaming.md
        label: "Streaming"
        name: music-streaming
        fields:
          - { label: Spotify Embed URL, name: spotifyEmbedUrl, widget: string, required: false, hint: "Spotify embed src URL" }
          - { label: Apple Music Embed URL, name: appleMusicEmbedUrl, widget: string, required: false }
          - { label: Bandcamp Embed URL, name: bandcampEmbedUrl, widget: string, required: false }
          - label: Section heading
            name: streamingHeading
            widget: object
            hint: "e.g. B — streaming"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Section subtitle
            name: streamingSubtitle
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Spotify embed label
            name: spotifyEmbedLabel
            widget: object
            hint: "Label shown above the Spotify iframe"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Apple Music embed label
            name: appleMusicEmbedLabel
            widget: object
            hint: "Label shown above the Apple Music iframe"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Coming Soon fallback
            name: streamingComingSoonMessage
            widget: object
            hint: "Shown when no embed URL is set"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Production note
            name: productionNote
            widget: object
            hint: "Small caption below the section heading"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── ♫ MUSIC — MIXES & PODCASTS ───────────────────────────────────────────────
  - name: mixes
    label: "♫ Music — Mixes & Podcasts"
    label_singular: Mix
    folder: src/content/mixes
    create: true
    delete: true
    slug: "{{date}}-{{slug}}"
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Duration, name: duration, widget: string, hint: "e.g. 6h 12m" }
      - label: Date
        name: date
        widget: datetime
        format: 'YYYY-MM-DD'
        date_format: 'YYYY-MM-DD'
        time_format: false
        picker_utc: true
      - label: Category
        name: category
        widget: select
        hint: "Single = standalone track. Live = recorded live performance. Collab = collaborative set."
        options:
          - { label: Single, value: single }
          - { label: Live, value: live }
          - { label: Collab, value: collab }
      - { label: Cover Art, name: coverArt, widget: image, required: false }
      - { label: SoundCloud URL, name: soundcloudUrl, widget: string, required: false }
      - { label: Spotify URL, name: spotifyUrl, widget: string, required: false }
      - { label: YouTube Music URL, name: youtubeMusicUrl, widget: string, required: false }
      - { label: Tracklist URL (view → link), name: tracklistUrl, widget: string, required: false, hint: "Link for the 'view →' tracklist button. Leave empty to hide the button." }
      - { label: Featured (shows on homepage), name: featured, widget: boolean, default: false }

  # ── ♫ MUSIC — ALBUMS ─────────────────────────────────────────────────────────
  - name: releases
    label: "♫ Music — Albums"
    label_singular: Release
    folder: src/content/releases
    create: true
    delete: true
    slug: "{{year}}-{{slug}}"
    format: frontmatter
    fields:
      - label: Title
        name: title
        widget: object
        hint: "Release title (e.g. BUNKER PROTOCOL)"
        fields:
          - { label: English, name: en, widget: string }
          - { label: Italiano, name: it, widget: string }
