backend:
  name: github
  repo: giorgiolorefice00/giorgiolorefice00.github.io
  site_domain: giorgiolorefice.com
  site_url: https://giorgiolorefice.com
  display_url: https://giorgiolorefice.com
  branch: main
  base_url: https://dj-oauth.vercel.app/
  auth_endpoint: api/auth

media_folder: public/uploads
public_folder: /uploads

collections:

  # ── ⚙ GLOBAL — SITE CONFIGURATION ──────────────────────────────────────────
  - name: siteConfig
    label: "⚙ Site Configuration"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/siteConfig/site-config.md
        label: "Site Configuration"
        name: site-config
        fields:
          - label: Social Media URLs
            name: socials
            widget: object
            fields:
              - { label: Instagram URL, name: instagram, widget: string, required: false }
              - { label: SoundCloud URL, name: soundcloud, widget: string, required: false }
              - { label: Spotify profile URL, name: spotify, widget: string, required: false, hint: "Used in footer social links" }
              - { label: Apple Music profile URL, name: appleMusic, widget: string, required: false, hint: "Used in footer social links" }
              - { label: Bandcamp URL, name: bandcamp, widget: string, required: false }
              - { label: YouTube Music URL, name: youtubeMusic, widget: string, required: false }
              - label: Spotify embed URL
                name: spotifyEmbedUrl
                widget: string
                required: false
                hint: "Full iframe-ready URL, e.g. https://open.spotify.com/embed/artist/XXXXX?utm_source=generator&theme=0"
              - label: Apple Music embed URL
                name: appleMusicEmbedUrl
                widget: string
                required: false
                hint: "Full iframe-ready URL, e.g. https://embed.music.apple.com/us/artist/XXXXX"
              - label: Bandcamp embed URL
                name: bandcampEmbedUrl
                widget: string
                required: false
                hint: "Full iframe-ready URL for Bandcamp player embed"
          - label: Contacts
            name: contacts
            widget: object
            fields:
              - label: Management
                name: management
                widget: object
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Email, name: email, widget: string }
                  - { label: Phone, name: phone, widget: string, required: false }
              - label: Booking Agency
                name: bookingAgency
                widget: object
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Email, name: email, widget: string }
                  - { label: Phone, name: phone, widget: string, required: false }
                  - label: Territory
                    name: territory
                    widget: object
                    fields:
                      - { label: English, name: en, widget: string }
                      - { label: Italiano, name: it, widget: string }
              - label: Press
                name: press
                widget: object
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Email, name: email, widget: string }
              - { label: General Contact Email, name: generalEmail, widget: string }
          - label: Downloadable Files
            name: files
            widget: object
            fields:
              - { label: EPK (.zip), name: epk, widget: string, required: false }
              - { label: Technical Rider, name: technicalRider, widget: string, required: false }
              - { label: Stage Plot, name: stagePlot, widget: string, required: false }
              - { label: Press Photos (.zip), name: pressPhotosZip, widget: string, required: false }

