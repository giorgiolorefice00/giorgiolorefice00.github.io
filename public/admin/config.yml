  # ── 🏠 HOME — HERO ───────────────────────────────────────────────────────────
  - name: homeHero
    label: "🏠 Home — Hero"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/homeHero/home-hero.md
        label: "Hero Section"
        name: home-hero
        fields:
          - label: Eyebrow
            name: heroEyebrow
            widget: object
            hint: "Small label above the DJ name (e.g. [ LIVE / 2026 — MILANO ])"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Tagline — left half
            name: heroTaglineLeft
            widget: object
            hint: "Appears left of the red divider (e.g. underground techno)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Tagline — right half
            name: heroTaglineRight
            widget: object
            hint: "Appears right of the red divider (e.g. rave architecture)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Photo caption
            name: heroPhotoCaption
            widget: object
            hint: "Small mono tag bottom-right of the DJ photo"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── 🏠 HOME — ABOUT SNIPPET ──────────────────────────────────────────────────
  - name: homeAbout
    label: "🏠 Home — About Snippet"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/homeAbout/home-about.md
        label: "About Snippet"
        name: home-about
        fields:
          - label: Section eyebrow
            name: aboutEyebrow
            widget: object
            hint: "Small label above the headline (e.g. [ 001 / about ])"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Read full story link text
            name: aboutLinkText
            widget: object
            hint: "The link that goes to /about (e.g. read the full story)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── 🏠 HOME — FEATURED MIX ───────────────────────────────────────────────────
  - name: homeMix
    label: "🏠 Home — Featured Mix"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/homeMix/home-mix.md
        label: "Featured Mix Section"
        name: home-mix
        fields:
          - label: Section eyebrow
            name: mixEyebrow
            widget: object
            hint: "Small label above the player (e.g. [ 002 / listen ])"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Latest Drop badge
            name: mixLatestDropLabel
            widget: object
            hint: "Badge shown on the mix card (e.g. LATEST DROP)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── 🏠 HOME — EVENTS PREVIEW ─────────────────────────────────────────────────
  - name: homeEvents
    label: "🏠 Home — Events Preview"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/homeEvents/home-events.md
        label: "Events Preview Section"
        name: home-events
        fields:
          - label: Section heading
            name: eventsHeading
            widget: object
            hint: "Large heading above the event cards (e.g. NEXT GIGS)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Section subtitle
            name: eventsSubtitle
            widget: object
            hint: "Small mono line below the heading"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── 🏠 HOME — PRESS SLIDER ───────────────────────────────────────────────────
  - name: homePress
    label: "🏠 Home — Press Slider"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/homePress/home-press.md
        label: "Press Slider Section"
        name: home-press
        fields:
          - label: Section eyebrow
            name: pressEyebrow
            widget: object
            hint: "Small label above the heading (e.g. [ 004 / press ])"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Heading line 1
            name: pressHeading1
            widget: object
            hint: "First line of the large heading (e.g. WHAT THEY'RE)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Heading line 2
            name: pressHeading2
            widget: object
            hint: "Second line of the large heading (e.g. SAYING.)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }

  # ── 👤 ABOUT — BIO & STATS ──────────────────────────────────────────────────
  - name: about
    label: "👤 About — Bio & Stats"
    delete: false
    editor: { preview: false }
    files:
      - name: about
        label: About the Artist
        file: src/content/about/about.md
        format: frontmatter
        fields:
          - label: Headline Lines
            name: headlineLines
            widget: list
            min: 3
            max: 3
            hint: "Exactly 3 lines. Line 2 renders in blood red."
            field: { label: Line, name: line, widget: string }
          - label: Short Paragraphs (homepage snippet)
            name: paragraphs
            widget: list
            field: { label: Paragraph, name: paragraph, widget: text }
          - label: Stats
            name: stats
            widget: list
            fields:
              - { label: Number, name: num, widget: string, hint: "e.g. 10+ or ∞" }
              - { label: Label, name: label, widget: string }
          - label: Full Bio (about page)
            name: fullBio
            widget: list
            required: false
            field: { label: Paragraph, name: paragraph, widget: text }
          - label: Fact File
            name: factFile
            widget: list
            required: false
            fields:
              - { label: Label, name: label, widget: string, hint: "e.g. born" }
              - { label: Value, name: value, widget: string, hint: "e.g. milano, 1993" }
          - { label: Born In, name: bornIn, widget: string, required: false }
          - { label: Based In, name: basedIn, widget: string, required: false }
          - { label: Active Since, name: activeSince, widget: string, required: false }

  # ── 👤 ABOUT — ACHIEVEMENTS ─────────────────────────────────────────────────
  - name: achievements
    label: "👤 About — Achievements"
    label_singular: Achievement
    folder: src/content/achievements
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    format: frontmatter
    fields:
      - { label: Year, name: year, widget: string, hint: "e.g. 2025" }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Order, name: order, widget: number, hint: "Lower number = shown first" }

  # ── 👤 ABOUT — RESIDENCIES ──────────────────────────────────────────────────
  - name: residencies
    label: "👤 About — Residencies"
    label_singular: Residency
    folder: src/content/residencies
    create: true
    delete: true
    slug: "{{slug}}"
    format: frontmatter
    fields:
      - { label: Venue, name: venue, widget: string }
      - { label: City, name: city, widget: string }
      - { label: Start Year, name: startYear, widget: string }
      - { label: End Year, name: endYear, widget: string, required: false, hint: "Leave blank for present" }

  # ── 👤 ABOUT — PARTNERSHIPS & STAGES ────────────────────────────────────────
  - name: partnerships
    label: "👤 About — Partnerships & Stages"
    label_singular: Partnership
    folder: src/content/partnerships
    create: true
    delete: true
    slug: "{{slug}}"
    format: frontmatter
    fields:
      - { label: Name, name: name, widget: string, hint: "e.g. TIME WARP" }
      - label: Type
        name: type
        widget: select
        options:
          - { label: Festival, value: festival }
          - { label: Brand, value: brand }
      - { label: Year, name: year, widget: string, required: false }

  # ── 👤 ABOUT — PAGE TEXT ────────────────────────────────────────────────────
  - name: aboutText
    label: "👤 About — Page Text"
    delete: false
    editor: { preview: false }
    files:
      - file: src/content/aboutText/about-text.md
        label: "About Page Text"
        name: about-text
        fields:
          - label: Page title — line 1
            name: titleLine1
            widget: object
            hint: "Large display text, line 1 (e.g. THE MAN)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Page title — line 2
            name: titleLine2
            widget: object
            hint: "Renders in blood red (e.g. BEHIND THE DECKS.)"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Achievements section heading
            name: achievementsHeading
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Residencies section heading
            name: residenciesHeading
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Partnerships section heading
            name: partnershipsHeading
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: Press articles section heading
            name: pressArticlesHeading
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: EPK eyebrow
            name: epkEyebrow
            widget: object
            hint: "Small label above the EPK download CTA"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: EPK download heading
            name: epkHeading
            widget: object
            hint: "Large CTA heading (e.g. ↓ DOWNLOAD EPK (.ZIP))"
            fields:
              - { label: English, name: en, widget: string }
              - { label: Italiano, name: it, widget: string }
          - label: EPK description
            name: epkDescription
